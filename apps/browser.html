<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: Tahoma, sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
        background: #ece9d8;
    }

    
    .tab-bar {
        background: #d4d0c8;
        display: flex;
        align-items: flex-end;
        gap: 2px;
        padding: 4px 4px 0;
        border-bottom: 2px solid #999;
        overflow-x: auto;
        min-height: 30px;
        scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tab {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 3px 8px 3px 10px;
        background: #bab5a8;
        border: 1px solid #999;
        border-bottom: none;
        border-radius: 4px 4px 0 0;
        cursor: pointer;
        font-size: 11px;
        max-width: 160px;
        flex-shrink: 0;
        user-select: none;
    }
    .tab.active {
        background: #ece9d8;
        border-bottom: 2px solid #ece9d8;
        margin-bottom: -2px;
        font-weight: bold;
    }
    .tab-title {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 110px;
    }
    .tab-close {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 11px;
        padding: 0 2px;
        color: #666;
        line-height: 1;
        flex-shrink: 0;
        border-radius: 2px;
    }
    .tab-close:hover { background: #c0392b; color: white; }

    .tab-new-btn {
        padding: 3px 10px;
        background: none;
        border: 1px solid transparent;
        border-radius: 4px 4px 0 0;
        cursor: pointer;
        font-size: 16px;
        color: #555;
        flex-shrink: 0;
        align-self: flex-end;
        margin-bottom: 1px;
        line-height: 1;
    }
    .tab-new-btn:hover { background: #c9c5bc; border-color: #999; }

    /* ── Nav Bar ── */
    .nav-bar {
        background: #d4d0c8;
        padding: 4px 6px;
        display: flex;
        gap: 4px;
        align-items: center;
        border-bottom: 1px solid #aaa;
    }
    .nav-bar input {
        flex: 1;
        padding: 3px 7px;
        font-family: Tahoma;
        font-size: 12px;
        border: 1px solid #999;
        border-radius: 2px;
    }
    .nav-bar button {
        font-family: Tahoma;
        font-size: 11px;
        padding: 3px 9px;
        cursor: pointer;
    }
    .bookmark-btn {
        background: #f0ede5;
        border: 1px solid #999;
        border-radius: 2px;
        font-size: 11px;
        padding: 3px 7px;
        cursor: pointer;
        white-space: nowrap;
    }
    .bookmark-btn:hover { background: #ddd; }

    /* ── Frames ── */
    .frames-container {
        flex: 1;
        position: relative;
        overflow: hidden;
    }
    .tab-frame {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: none;
        display: none;
        background: white;
    }
    .tab-frame.active { display: block; }

    /* ── Empty tab placeholder ── */
    .tab-placeholder {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background: #f5f3ee;
        color: #888;
        font-size: 13px;
    }
    .tab-placeholder .logo { font-size: 40px; }
</style>
</head>
<body>

<div class="tab-bar" id="tab-bar"></div>

<div class="nav-bar">
    <button class="bookmark-btn" onclick="favoriteCurrent()">⭐</button>
    <input id="url-input" placeholder="Digite uma URL ou domínio .gogo"
           onkeydown="if(event.key==='Enter') navigate()">
    <button onclick="navigate()">Ir</button>
    <button class="bookmark-btn" onclick="navigate('bloggy.gogo')">🌐 BLOGGY.gogo</button>
</div>

<div class="frames-container" id="frames-container"></div>

<script>
let tabs       = [];
let activeId   = null;
let tabCounter = 0;

function newTab(url) {
    const id      = ++tabCounter;
    const frame   = document.createElement('iframe');
    frame.className = 'tab-frame';
    frame.id      = `frame-${id}`;
    document.getElementById('frames-container').appendChild(frame);

    tabs.push({ id, title: 'Nova aba', url: url || '' });
    renderTabs();
    setActive(id);
    if (url) loadUrl(id, url);
}

function closeTab(id) {
    const idx = tabs.findIndex(t => t.id === id);
    tabs = tabs.filter(t => t.id !== id);
    document.getElementById(`frame-${id}`)?.remove();

    if (tabs.length === 0) {
        newTab();
        return;
    }
    if (activeId === id) {
        setActive((tabs[idx] || tabs[idx - 1]).id);
    } else {
        renderTabs();
    }
}

function setActive(id) {
    activeId = id;
    document.querySelectorAll('.tab-frame').forEach(f => f.classList.remove('active'));
    document.getElementById(`frame-${id}`)?.classList.add('active');
    const tab = tabs.find(t => t.id === id);
    document.getElementById('url-input').value = tab?.url || '';
    renderTabs();
}

function renderTabs() {
    const bar = document.getElementById('tab-bar');
    bar.innerHTML = '';

    tabs.forEach(tab => {
        const el        = document.createElement('div');
        el.className    = 'tab' + (tab.id === activeId ? ' active' : '');
        el.title        = tab.title;
        el.innerHTML    = `
            <span class="tab-title">${tab.title}</span>
            <button class="tab-close" title="Fechar aba">✕</button>
        `;
        el.querySelector('.tab-title').onclick = () => setActive(tab.id);
        el.querySelector('.tab-close').onclick = e => { e.stopPropagation(); closeTab(tab.id); };
        bar.appendChild(el);
    });

    const addBtn      = document.createElement('button');
    addBtn.className  = 'tab-new-btn';
    addBtn.title      = 'Nova aba';
    addBtn.textContent = '+';
    addBtn.onclick    = () => newTab();
    bar.appendChild(addBtn);
}

async function resolveUrl(raw) {
    raw = raw.trim();
    if (!raw) return null;

    if (raw.endsWith('.gogo')) {
        const nome = raw.replace('.gogo', '').toLowerCase();
        try {
            const res   = await fetch('../sites.json');
            const sites = await res.json();
            const site  = sites.find(s => s.nome.toLowerCase() === nome);
            if (!site) { alert('Site .gogo não encontrado!'); return null; }
            return { resolved: site.html, display: raw };
        } catch { alert('Erro ao carregar sites.json'); return null; }
    }

    const url = raw.startsWith('http') ? raw : 'https://' + raw;
    return { resolved: url, display: url };
}

async function loadUrl(tabId, raw) {
    const result = await resolveUrl(raw);
    if (!result) return;

    const tab = tabs.find(t => t.id === tabId);
    if (!tab) return;
    tab.url = result.display;

    const frame = document.getElementById(`frame-${tabId}`);
    if (!frame) return;
    frame.src = result.resolved;

    if (tabId === activeId) document.getElementById('url-input').value = result.display;

    frame.onload = () => {
        try { tab.title = frame.contentDocument?.title || result.display || 'Página'; }
        catch { tab.title = result.display || 'Página'; }
        renderTabs();
    };
}

async function navigate(customUrl) {
    const raw = customUrl || document.getElementById('url-input').value.trim();
    if (!raw) return;
    if (!activeId) { newTab(raw); return; }
    loadUrl(activeId, raw);
}


newTab();
</script>
</body>
</html>
