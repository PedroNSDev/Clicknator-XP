<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin:0; font-family:sans-serif; }
        .bar {
            background:#ddd;
            padding:5px;
            display:flex;
        }
        input {
            flex:1;
            padding:5px;
        }
        iframe {
            width:100%;
            height:calc(100vh - 40px);
            border:none;
        }
    </style>
</head>
<body>

<div class="bar">
    <input id="url" placeholder="Digite uma URL (ex: https://example.com)">
    <button onclick="go()">Ir</button>
</div>

<iframe id="frame"></iframe>

<script>
async function go() {
    let url = document.getElementById('url').value.trim();

    // .gogo
    if (url.endsWith('.gogo')) {
        const nome = url.replace('.gogo', '').toLowerCase();

        try {
            const res = await fetch('../sites.json'); // 👈 caminho corrigido
            const sites = await res.json();

            const site = sites.find(s => 
                s.nome.toLowerCase() === nome
            );

            if (!site) {
                alert('Site .gogo não encontrado!');
                return;
            }

            document.getElementById('frame').src = site.html;
            return;

        } catch (err) {
            console.error(err);
            alert('Erro ao carregar sites.json');
            return;
        }
    }

    // FLUXO NORMAL
    if (!url.startsWith('http')) {
        url = 'https://' + url;
    }

    document.getElementById('frame').src = url;
}
</script>
</body>
</html>
