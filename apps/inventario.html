<!DOCTYPE html>
<html>
<head>
<style>
body {
    font-family: Tahoma;
    background: #ece9d8;
    margin: 0;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    border: 1px solid #999;
    padding: 5px;
    font-size: 12px;
}

th {
    background: #d4d0c8;
    text-align: left;
}

tr:hover {
    background: #316ac5;
    color: white;
    cursor: pointer;
}

.toolbar {
    padding: 5px;
    background: #d4d0c8;
}
</style>
</head>
<body>

<div class="toolbar">
    <button onclick="loadFiles()">Atualizar</button>
</div>

<table>
    <thead>
        <tr>
            <th>Nome</th>
            <th>Tipo</th>
            <th>Ação</th>
        </tr>
    </thead>
    <tbody id="file-list"></tbody>
</table>

<script>
function loadFiles() {
    const files = JSON.parse(localStorage.getItem('winxp-files')) || [];
    const list = document.getElementById('file-list');

    list.innerHTML = '';

    files.forEach(file => {
        const tr = document.createElement('tr');

        tr.innerHTML = `
            <td>${file.name}</td>
            <td>${file.type}</td>
            <td><button onclick="remover(${file.id})">Excluir</button></td>
        `;

        list.appendChild(tr);
    });
}
function remover(id) {
    if (window.parent && window.parent.deleteFile) {
        window.parent.deleteFile(id);
    } else {
        console.error('deleteFile não encontrado no sistema principal');
    }

    loadFiles();
}
loadFiles();
</script>

</body>
</html>
