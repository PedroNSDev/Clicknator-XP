<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    body {
        font-family: Tahoma, sans-serif;
        background: #ece9d8;
        margin: 0;
        padding: 10px;
    }

    .toolbar {
        padding: 4px 0 8px;
        display: flex;
        gap: 6px;
        align-items: center;
    }
    .toolbar button {
        font-family: Tahoma; font-size: 11px;
        padding: 2px 8px; cursor: pointer;
    }
    .storage-bar-wrap {
        background: #c0bdba;
        border: 1px inset #808080;
        height: 14px; border-radius: 2px;
        flex: 1; overflow: hidden;
    }
    .storage-bar {
        height: 100%;
        background: linear-gradient(to right, #316ac5, #4a90e2);
        transition: width 0.3s;
    }
    .storage-label { font-size: 11px; color: #333; white-space: nowrap; }

    table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        box-shadow: inset 1px 1px 2px rgba(0,0,0,0.15);
    }
    th, td {
        border: 1px solid #d4d0c8;
        padding: 4px 7px;
        font-size: 11px;
        vertical-align: middle;
    }
    th {
        background: #d4d0c8;
        text-align: left;
        border-color: #fff #999 #999 #fff;
        font-weight: bold;
    }
    tr.file-row:hover { background: #316ac5; color: white; }
    tr.file-row:hover .tree-connector,
    tr.file-row:hover .toggle-btn { color: white; }

    .tipo-app { color: #800000; font-weight: bold; }

    .toggle-btn {
        display: inline-block;
        width: 14px; cursor: pointer;
        font-size: 9px; color: #333;
        user-select: none; text-align: center;
    }
    .tree-connector { color: #aaa; }

    /* Image thumbnail inside table */
    .thumb {
        width: 28px; height: 22px;
        object-fit: cover;
        border-radius: 2px;
        border: 1px solid #ccc;
        vertical-align: middle;
        cursor: pointer;
        margin-right: 3px;
    }

    /* Shortcut indicator */
    .shortcut-url {
        color: #555; font-style: italic;
        font-size: 10px; max-width: 160px;
        overflow: hidden; text-overflow: ellipsis;
        white-space: nowrap;
        display: inline-block; vertical-align: middle;
    }
</style>
</head>
<body>

<div class="toolbar">
    <button onclick="load()">🔄 Atualizar</button>
    <div class="storage-bar-wrap">
        <div class="storage-bar" id="storBar" style="width:0%"></div>
    </div>
    <span class="storage-label" id="storLabel">...</span>
</div>

<table>
    <thead>
        <tr>
            <th>Nome</th>
            <th>Tipo</th>
            <th>Tamanho</th>
            <th>Info</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody id="list"></tbody>
</table>

<script>
const ICONS = { text:'📝', folder:'📁', app:'⚙️', fish:'🐟', image:'🖼️', shortcut:'⭐', default:'📄' };

function load() {
    const tbody = document.getElementById('list');
    tbody.innerHTML = '';

    const all    = window.parent.getFiles?.() || [];
    const total  = window.parent.systemInfo?.space || 2048;
    const used   = all.reduce((a, f) => a + (f.size || 50), 0);
    const pct    = Math.min(100, Math.round(used / total * 100));

    document.getElementById('storBar').style.width = pct + '%';
    document.getElementById('storLabel').textContent = `${used} / ${total} MB (${pct}%)`;

    if (!all.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#888;">Armazenamento vazio.</td></tr>';
        return;
    }

    // Identify files that are children of a folder
    const childIds = new Set();
    all.forEach(f => {
        if (f.type === 'folder' && Array.isArray(f.data?.children))
            f.data.children.forEach(id => childIds.add(id));
    });

    const roots = all.filter(f => !childIds.has(f.id));

    function makeRow(file, isChild = false, parentId = null) {
        const tr = document.createElement('tr');
        tr.className = 'file-row';
        tr.dataset.id = file.id;
        if (isChild) tr.dataset.parentFolder = parentId;

        const isFolder   = file.type === 'folder';
        const isImage    = file.type === 'image';
        const isShortcut = file.type === 'shortcut';
        const isApp      = file.type === 'app';
        const icon       = ICONS[file.type] || ICONS.default;

        // Name cell
        let nameHtml = '';
        const indent = isChild
            ? `<span class="tree-connector" style="margin-left:14px;">└─</span> `
            : `<span style="display:inline-block;width:14px;"></span> `;

        if (isFolder) {
            nameHtml = `<span class="toggle-btn" data-folder="${file.id}"
                            onclick="toggleFolder(${file.id}, this, event)">▶</span> ${icon} ${file.name}`;
        } else if (isImage && file.data?.src) {
            nameHtml = `${indent}<img class="thumb" src="${file.data.src}"
                            title="Visualizar" onclick="viewImage(${JSON.stringify(file).replace(/"/g, '&quot;')})"> ${file.name}`;
        } else {
            nameHtml = `${indent}${icon} ${file.name}`;
        }

        // Info cell
        let info = '—';
        if (isShortcut && file.data?.url) {
            info = `<span class="shortcut-url" title="${file.data.url}">${file.data.url}</span>`;
        } else if (isImage && file.data?.src) {
            info = `<a href="#" style="font-size:10px;" onclick="viewImage(${JSON.stringify(file).replace(/"/g, '&quot;')});return false;">Ver imagem</a>`;
        }

        tr.innerHTML = `
            <td>${nameHtml}</td>
            <td ${isApp ? 'class="tipo-app"' : ''}>${file.type}</td>
            <td>${file.size || 0} MB</td>
            <td>${info}</td>
            <td><button onclick="del(${file.id})">🗑️ Excluir</button></td>
        `;

        tbody.appendChild(tr);

        // Render children (hidden by default)
        if (isFolder && Array.isArray(file.data?.children)) {
            file.data.children.forEach(childId => {
                const child = all.find(x => x.id === childId);
                if (!child) return;
                const childTr = makeRow(child, true, file.id);
                childTr.classList.add(`children-of-${file.id}`);
                childTr.style.display = 'none';
            });
        }
        return tr;
    }

    roots.forEach(f => makeRow(f));
}

window.toggleFolder = function(folderId, span, event) {
    event.stopPropagation();
    const open     = span.textContent === '▼';
    span.textContent = open ? '▶' : '▼';
    document.querySelectorAll(`.children-of-${folderId}`).forEach(tr => {
        tr.style.display = open ? 'none' : 'table-row';
    });
};

window.del = function(id) {
    if (!confirm('Excluir permanentemente? Esta ação não pode ser desfeita.')) return;
    window.parent.deleteFile?.(id);
    load();
};

window.viewImage = function(file) {
    window.parent.openImageViewer?.(file);
};

window.addEventListener('message', event => {
    if (event.data?.type === 'file-deleted') load();
});

load();
</script>
</body>
</html>
