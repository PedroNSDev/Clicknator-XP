<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>GoMusic</title>
<style>
 * { margin:0; padding:0; box-sizing:border-box; }

body {
  background: linear-gradient(to bottom, #5a8fd8, #3a6ea5);
  font-family: Tahoma, Verdana, sans-serif;
  color: #000;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── VISUALIZER ── */
#visualizer {
  width: 100%;
  height: 80px;
  background: linear-gradient(to bottom, #dfe9f7, #b7c9e5);
  border-bottom: 2px solid #7f9db9;
}

/* ── COVER AREA ── */
#cover-area {
  display: flex;
  align-items: center;
  padding: 6px 10px;
  gap: 10px;
  background: linear-gradient(to bottom, #ece9d8, #d6d3c4);
  border-bottom: 2px solid #a0a0a0;
}

#cover-art {
  width: 54px;
  height: 54px;
  background: #fff;
  border: 2px inset #c0c0c0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
}

#cover-art img {
  width:100%;
  height:100%;
  object-fit:cover;
}

#track-name {
  font-size: 12px;
  font-weight: bold;
}

#track-sub {
  font-size: 11px;
  color: #444;
}

#track-time {
  font-size: 11px;
  color: #333;
}

/* ── PROGRESS ── */
#progress-wrap {
  padding: 6px 10px;
  background: #ece9d8;
}

#progress-bar-bg {
  height: 10px;
  background: #fff;
  border: 2px inset #c0c0c0;
  position: relative;
}

#progress-bar-fill {
  height: 100%;
  background: linear-gradient(to bottom, #4a7ad4, #2f5ea3);
  width: 0%;
}

#progress-dot {
  display: none;
}

/* ── CONTROLS ── */
#controls {
  display: flex;
  justify-content: center;
  gap: 6px;
  padding: 6px;
  background: #ece9d8;
  border-top: 2px solid #fff;
  border-bottom: 2px solid #a0a0a0;
}

.ctrl-btn, #play-btn {
  width: 32px;
  height: 32px;
  border: 2px outset #fff;
  background: linear-gradient(to bottom, #f6f6f6, #dcdcdc);
  cursor: pointer;
  font-size: 14px;
}

.ctrl-btn:active, #play-btn:active {
  border: 2px inset #999;
}

.ctrl-btn.active {
  background: #cddcf5;
}

#play-btn {
  width: 40px;
  height: 40px;
  font-size: 18px;
}

/* ── VOLUME ── */
#vol-row {
  display: flex;
  align-items: center;
  padding: 6px 10px;
  gap: 6px;
  background: #ece9d8;
}

#vol-slider {
  flex: 1;
  height: 6px;
  background: #fff;
  border: 2px inset #c0c0c0;
}

#vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  background: #dcdcdc;
  border: 2px outset #fff;
}

/* ── PLAYLIST ── */
#playlist-header {
  display: flex;
  justify-content: space-between;
  padding: 6px 10px;
  background: linear-gradient(to bottom, #d6d3c4, #c0c0c0);
  border-top: 2px solid #fff;
  border-bottom: 2px solid #808080;
  font-size: 11px;
}

#add-file-btn {
  border: 2px outset #fff;
  background: #dcdcdc;
  font-size: 11px;
  cursor: pointer;
}

#add-file-btn:active {
  border: 2px inset #999;
}

#playlist {
  flex: 1;
  overflow-y: auto;
  background: #fff;
}

.pl-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-bottom: 1px solid #ddd;
  cursor: pointer;
  font-size: 12px;
}

.pl-item:hover {
  background: #dbe8ff;
}

.pl-item.playing {
  background: #c6d8ff;
}

.pl-name {
  flex: 1;
}

.pl-del {
  border: none;
  background: none;
  cursor: pointer;
  color: #900;
}

/* ── SCROLLBAR XP ── */
#playlist::-webkit-scrollbar {
  width: 12px;
}

#playlist::-webkit-scrollbar-track {
  background: #d4d0c8;
}

#playlist::-webkit-scrollbar-thumb {
  background: #c0c0c0;
  border: 2px outset #fff;
}

/* ── EMPTY ── */
#empty-state {
  text-align: center;
  padding: 30px;
  color: #555;
}
</style>
</head>
<body>

<canvas id="visualizer"></canvas>

<div id="cover-area">
  <div id="cover-art">🎵</div>
  <div id="track-info">
    <div id="track-name">Nenhuma faixa</div>
    <div id="track-sub">Adicione músicas à playlist</div>
  </div>
  <div id="track-time">0:00 / 0:00</div>
</div>

<div id="progress-wrap">
  <div id="progress-bar-bg">
    <div id="progress-bar-fill"></div>
    <div id="progress-dot"></div>
  </div>
</div>

<div id="controls">
  <button class="ctrl-btn" id="shuffle-btn" title="Aleatório">🔀</button>
  <button class="ctrl-btn" id="prev-btn" title="Anterior">⏮</button>
  <button id="play-btn" title="Play/Pause">▶</button>
  <button class="ctrl-btn" id="next-btn" title="Próxima">⏭</button>
  <button class="ctrl-btn" id="repeat-btn" title="Repetir">🔁</button>
</div>

<div id="vol-row">
  <span id="vol-icon">🔊</span>
  <input type="range" id="vol-slider" min="0" max="100" value="80">
</div>

<div id="playlist-header">
  <span id="pl-count">0 faixas</span>
  <button id="add-file-btn">+ Adicionar</button>
</div>

<div id="playlist">
  <div id="empty-state">
    <div class="big">🎵</div>
    <div>Arraste arquivos de áudio aqui<br>ou clique em "Adicionar"</div>
  </div>
</div>

<div id="drop-overlay">⬇ Solte o áudio aqui</div>

<script>
const audio = new Audio();
let playlist = [];
let currentIdx = -1;
let shuffle = false;
let repeat = false; // 0=off 1=one 2=all
let repeatMode = 0;
let isMuted = false;
let audioCtx = null, analyser = null, source = null, animFrame = null;

const playBtn       = document.getElementById('play-btn');
const prevBtn       = document.getElementById('prev-btn');
const nextBtn       = document.getElementById('next-btn');
const shuffleBtn    = document.getElementById('shuffle-btn');
const repeatBtn     = document.getElementById('repeat-btn');
const trackName     = document.getElementById('track-name');
const trackSub      = document.getElementById('track-sub');
const trackTime     = document.getElementById('track-time');
const progressFill  = document.getElementById('progress-bar-fill');
const progressBg    = document.getElementById('progress-bar-bg');
const volSlider     = document.getElementById('vol-slider');
const volIcon       = document.getElementById('vol-icon');
const plContainer   = document.getElementById('playlist');
const plCount       = document.getElementById('pl-count');
const addFileBtn    = document.getElementById('add-file-btn');
const canvas        = document.getElementById('visualizer');
const vctx          = canvas.getContext('2d');

// ── RESIZE CANVAS ──
function resizeCanvas() {
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── WEB AUDIO VISUALIZER ──
function setupVisualizer() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser  = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    source    = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    drawVisualizer();
  } catch(e) { console.warn('Visualizer unavailable', e); }
}

function drawVisualizer() {
  animFrame = requestAnimationFrame(drawVisualizer);
  if (!analyser) return;
  resizeCanvas();
  const W = canvas.width, H = canvas.height;
  const buf = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(buf);
  vctx.clearRect(0, 0, W, H);
  const bars = 48;
  const bw   = (W / bars) - 1;
  for (let i = 0; i < bars; i++) {
    const val  = buf[Math.floor(i * buf.length / bars)] / 255;
    const h    = Math.max(2, val * H * 0.9);
    const hue  = 250 + val * 60;
    const alpha= 0.5 + val * 0.5;
    vctx.fillStyle = `hsla(${hue},80%,65%,${alpha})`;
    vctx.fillRect(i * (bw + 1), H - h, bw, h);
  }
}

// ── LOAD TRACK ──
function loadTrack(idx, autoPlay = true) {
  if (!playlist.length) return;
  idx = ((idx % playlist.length) + playlist.length) % playlist.length;
  currentIdx = idx;
  const track = playlist[idx];
  audio.src = track.src;
  audio.volume = volSlider.value / 100;
  trackName.textContent  = track.name;
  trackSub.textContent   = track.sub || 'Arquivo local';
  progressFill.style.width = '0%';
  trackTime.textContent  = '0:00 / 0:00';
  renderPlaylist();
  if (autoPlay) {
    setupVisualizer();
    audio.play().catch(()=>{});
    playBtn.textContent = '⏸';
  }
  emitStatus();
}

function emitStatus() {
  const track = playlist[currentIdx];
  window.parent?.postMessage({
    type: 'audio-status',
    name: track?.name || '',
    playing: !audio.paused,
    trackIdx: currentIdx,
    total: playlist.length
  }, '*');
}

// ── CONTROLS ──
playBtn.addEventListener('click', () => {
  if (!playlist.length) return;
  if (currentIdx === -1) { loadTrack(0); return; }
  setupVisualizer();
  if (audioCtx?.state === 'suspended') audioCtx.resume();
  if (audio.paused) { audio.play(); playBtn.textContent = '⏸'; }
  else              { audio.pause(); playBtn.textContent = '▶'; }
  emitStatus();
});

nextBtn.addEventListener('click', () => nextTrack());
prevBtn.addEventListener('click', () => {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  const ni = shuffle ? rndIdx() : currentIdx - 1;
  loadTrack(ni < 0 ? playlist.length - 1 : ni);
});

shuffleBtn.addEventListener('click', () => {
  shuffle = !shuffle;
  shuffleBtn.classList.toggle('active', shuffle);
});

repeatBtn.addEventListener('click', () => {
  repeatMode = (repeatMode + 1) % 3;
  repeatBtn.classList.toggle('active', repeatMode > 0);
  repeatBtn.textContent = repeatMode === 1 ? '🔂' : '🔁';
  repeatBtn.title = ['Desligado','Repetir 1','Repetir tudo'][repeatMode];
});

function rndIdx() {
  if (playlist.length <= 1) return 0;
  let r; do { r = Math.floor(Math.random() * playlist.length); } while (r === currentIdx);
  return r;
}

function nextTrack() {
  if (!playlist.length) return;
  if (repeatMode === 1) { audio.currentTime = 0; audio.play(); return; }
  const ni = shuffle ? rndIdx() : currentIdx + 1;
  if (ni >= playlist.length) {
    if (repeatMode === 2) loadTrack(0);
    else { audio.pause(); playBtn.textContent = '▶'; emitStatus(); }
    return;
  }
  loadTrack(ni);
}

audio.addEventListener('ended',       () => nextTrack());
audio.addEventListener('timeupdate',  updateProgress);
audio.addEventListener('loadedmetadata', updateProgress);

function updateProgress() {
  if (!audio.duration) return;
  const pct = audio.currentTime / audio.duration * 100;
  progressFill.style.width = pct + '%';
  document.getElementById('progress-dot').style.right = (100 - pct) + '%';
  trackTime.textContent = `${fmt(audio.currentTime)} / ${fmt(audio.duration)}`;
  // Emit every few seconds
  if (Math.round(audio.currentTime) % 5 === 0) emitStatus();
}

progressBg.addEventListener('click', e => {
  const rect = progressBg.getBoundingClientRect();
  audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
});

volSlider.addEventListener('input', () => {
  audio.volume = volSlider.value / 100;
  isMuted = false;
  volIcon.textContent = volSlider.value > 50 ? '🔊' : volSlider.value > 0 ? '🔉' : '🔇';
});

volIcon.addEventListener('click', () => {
  isMuted = !isMuted;
  audio.muted = isMuted;
  volIcon.textContent = isMuted ? '🔇' : volSlider.value > 50 ? '🔊' : '🔉';
});

function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${String(sec).padStart(2,'0')}`;
}

// ── PLAYLIST RENDER ──
function renderPlaylist() {
  if (!playlist.length) {
    plContainer.innerHTML = `<div id="empty-state"><div class="big">🎵</div><div>Arraste arquivos de áudio aqui<br>ou clique em "Adicionar"</div></div>`;
    plCount.textContent = '0 faixas';
    return;
  }
  plCount.textContent = `${playlist.length} faixa${playlist.length !== 1 ? 's' : ''}`;
  plContainer.innerHTML = playlist.map((t, i) => `
    <div class="pl-item ${i === currentIdx ? 'playing' : ''}" data-idx="${i}">
      <span class="pl-num">${i === currentIdx ? '▶' : i+1}</span>
      <span class="pl-icon">🎵</span>
      <span class="pl-name" title="${t.name}">${t.name}</span>
      <span class="pl-dur">${t.dur || '--:--'}</span>
      <button class="pl-del" data-del="${i}" title="Remover">✕</button>
    </div>
  `).join('');

  plContainer.querySelectorAll('.pl-item').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.classList.contains('pl-del')) return;
      loadTrack(parseInt(el.dataset.idx));
    });
  });
  plContainer.querySelectorAll('.pl-del').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const di = parseInt(btn.dataset.del);
      playlist.splice(di, 1);
      if (currentIdx === di) { audio.pause(); currentIdx = -1; trackName.textContent = 'Nenhuma faixa'; }
      else if (currentIdx > di) currentIdx--;
      renderPlaylist();
    });
  });
}

// ── ADD FILES ──
function addFromFile(file) {
  if (!file.type.startsWith('audio/')) return;
  const src = URL.createObjectURL(file);
  const name = file.name.replace(/\.[^.]+$/, '');
  const track = { name, src, sub: 'Arquivo local', dur: '--:--' };
  const tmpAudio = new Audio(src);
  tmpAudio.addEventListener('loadedmetadata', () => {
    track.dur = fmt(tmpAudio.duration);
    renderPlaylist();
  });
  playlist.push(track);
  if (currentIdx === -1) loadTrack(0, false);
  renderPlaylist();
}

function addFromBase64(name, src) {
  const cleanName = name.replace(/\.[^.]+$/, '');
  const track = { name: cleanName, src, sub: 'Arquivo do sistema', dur: '--:--' };
  const tmpAudio = new Audio(src);
  tmpAudio.addEventListener('loadedmetadata', () => {
    track.dur = fmt(tmpAudio.duration);
    renderPlaylist();
  });
  playlist.push(track);
  if (currentIdx === -1) loadTrack(0, false);
  renderPlaylist();
}

addFileBtn.addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'audio/*'; input.multiple = true;
  input.onchange = e => [...e.target.files].forEach(addFromFile);
  input.click();
});

// ── DRAG & DROP ──
document.addEventListener('dragover', e => { e.preventDefault(); document.body.classList.add('dragging'); });
document.addEventListener('dragleave', e => { if (!e.relatedTarget) document.body.classList.remove('dragging'); });
document.addEventListener('drop', e => {
  e.preventDefault(); document.body.classList.remove('dragging');
  [...e.dataTransfer.files].filter(f => f.type.startsWith('audio/')).forEach(addFromFile);
});

// ── API  ──
window.addEventListener('message', e => {
  const { type, resource, action } = e.data || {};
  if (type === 'resource-received' && resource?.type === 'audio') {
    if (resource.data?.src) addFromBase64(resource.name, resource.data.src);
  }
  if (type === 'control') {
    if (action === 'toggle') playBtn.click();
    if (action === 'next')   nextTrack();
    if (action === 'prev')   prevBtn.click();
  }
});

renderPlaylist();
</script>
</body>
</html>
