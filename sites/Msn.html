<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MSN Messenger - Rede Social</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }

body {
    font-family: Tahoma, sans-serif;
    background: #d4d0c8;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ── Header bar ── */
.msn-header {
    background: linear-gradient(135deg, #003399 0%, #0055cc 50%, #0066ff 100%);
    padding: 6px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 2px solid #002288;
    flex-shrink: 0;
}
.msn-logo { font-size: 22px; }
.msn-title { color: white; font-size: 14px; font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
.msn-status-dot {
    width: 10px; height: 10px; border-radius: 50%; margin-left: auto;
    background: #44ff44; box-shadow: 0 0 6px #44ff44;
}

/* ── Login screen ── */
#login-screen {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    background: linear-gradient(180deg, #cce0ff 0%, #e8f0ff 100%);
}
.login-box {
    background: white; border: 1px solid #aaa;
    padding: 20px 24px; width: 280px; display: flex;
    flex-direction: column; gap: 10px;
    box-shadow: 2px 2px 8px rgba(0,0,0,0.2);
}
.login-box h2 { font-size: 14px; color: #003399; border-bottom: 1px solid #ddd; padding-bottom: 6px; }
.login-box label { font-size: 11px; color: #333; }
.login-box input, .login-box select {
    width: 100%; font-family: Tahoma; font-size: 12px;
    border: 1px inset #aaa; padding: 3px 5px; height: 24px;
}
.btn-signin {
    background: linear-gradient(to bottom, #0066ff, #0044cc);
    color: white; border: 1px solid #002288;
    font-family: Tahoma; font-size: 12px; font-weight: bold;
    padding: 5px; cursor: pointer; border-radius: 2px;
    margin-top: 5px;
}
.btn-signin:hover { background: linear-gradient(to bottom, #0077ff, #0055dd); }
.btn-secondary {
    background: #e4e0d8; color: #333; border: 1px solid #aaa;
    font-family: Tahoma; font-size: 11px; padding: 4px; cursor: pointer;
    border-radius: 2px; text-align: center; text-decoration: none;
}
.btn-secondary:hover { background: #d4d0c8; }

.avatar-pick { display: flex; gap: 6px; flex-wrap: wrap; }
.av-opt {
    width: 32px; height: 32px; font-size: 20px; text-align: center;
    line-height: 32px; border: 2px solid #ccc; cursor: pointer; border-radius: 4px;
}
.av-opt.chosen { border-color: #0055cc; background: #e0eeff; }

/* ── Main UI ── */
#main-ui { flex: 1; display: flex; overflow: hidden; }

/* Contact list */
.contacts-panel {
    width: 190px; flex-shrink: 0;
    background: white; border-right: 1px solid #aaa;
    display: flex; flex-direction: column;
    overflow: hidden;
}
.my-profile {
    background: linear-gradient(135deg, #003399, #0055cc);
    padding: 8px; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.my-avatar { font-size: 28px; }
.my-info { flex: 1; overflow: hidden; }
.my-name  { font-size: 12px; font-weight: bold; color: white;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.my-mood  { font-size: 10px; color: #aaccff;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
.my-status-badge {
    font-size: 10px; padding: 1px 5px; border-radius: 8px;
    background: rgba(255,255,255,0.2); color: white; cursor: pointer;
    white-space: nowrap;
}

.contacts-title {
    font-size: 10px; font-weight: bold; color: #666;
    background: #f0ede5; padding: 3px 8px;
    border-bottom: 1px solid #ddd; text-transform: uppercase;
    letter-spacing: 0.5px; flex-shrink: 0;
}
.contacts-list { flex: 1; overflow-y: auto; }
.contact-item {
    padding: 6px 8px; display: flex; align-items: center; gap: 7px;
    cursor: pointer; border-bottom: 1px solid #f0ede5;
    transition: background 0.1s;
}
.contact-item:hover { background: #e8f0ff; }
.contact-item.active { background: #d0e4ff; }
.contact-item.unread .ct-name { font-weight: bold; }
.ct-av { font-size: 22px; position: relative; flex-shrink: 0; }
.ct-dot {
    position: absolute; bottom: -1px; right: -1px;
    width: 8px; height: 8px; border-radius: 50%; border: 1px solid white;
}
.dot-online { background: #44cc44; }
.dot-away   { background: #ffaa00; }
.dot-busy   { background: #cc4444; }
.dot-offline{ background: #888; }
.ct-info { flex: 1; overflow: hidden; }
.ct-name { font-size: 11px; color: #222; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ct-mood { font-size: 10px; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ct-unread-badge {
    background: #0055cc; color: white;
    font-size: 9px; padding: 1px 5px; border-radius: 8px; flex-shrink: 0;
}


.add-contact-row {
    display: flex; gap: 4px; padding: 5px 6px;
    border-top: 1px solid #ddd; flex-shrink: 0;
}
.add-contact-row input {
    flex: 1; font-family: Tahoma; font-size: 11px;
    border: 1px inset #aaa; padding: 2px 4px; height: 22px;
}
.add-contact-row button {
    font-family: Tahoma; font-size: 10px; font-weight: bold;
    padding: 0 7px; cursor: pointer; height: 22px;
    background: linear-gradient(to bottom, #0066ff, #0044cc);
    color: white; border: 1px solid #002288; border-radius: 2px;
}

/* Botão Sair */
.btn-logout {
    font-family: Tahoma; font-size: 10px; color: #cc4444;
    background: none; border: none; cursor: pointer;
    text-decoration: underline; padding: 5px; text-align: center;
}
.btn-logout:hover { color: #ff0000; }

/* ── Chat area ── */
.chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.no-chat-placeholder {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; color: #888; background: #f5f3ee;
}
.no-chat-placeholder .big-logo { font-size: 56px; }
.chat-header {
    background: linear-gradient(135deg, #eef4ff, #ddeaff);
    padding: 6px 10px; border-bottom: 1px solid #b0c8ee;
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.chat-header-av { font-size: 26px; }
.chat-header-info { flex: 1; }
.chat-header-name { font-size: 13px; font-weight: bold; color: #003399; }
.chat-header-mood { font-size: 10px; color: #666; }
.chat-header-status { font-size: 10px; padding: 2px 7px; border-radius: 8px; font-weight: bold; }

.messages {
    flex: 1; overflow-y: auto; padding: 8px;
    background: white; display: flex; flex-direction: column; gap: 6px;
}
.msg-row { display: flex; align-items: flex-end; gap: 5px; }
.msg-row.mine  { flex-direction: row-reverse; }
.msg-av  { font-size: 18px; flex-shrink: 0; }
.msg-bubble {
    max-width: 70%; padding: 6px 9px; border-radius: 10px;
    font-size: 12px; line-height: 1.4;
    box-shadow: 1px 1px 2px rgba(0,0,0,0.1);
}
.msg-row.mine  .msg-bubble { background: #d0e8ff; border-bottom-right-radius: 2px; }
.msg-row.other .msg-bubble { background: #f0ede5; border-bottom-left-radius: 2px; }
.msg-img { max-width: 160px; border-radius: 6px; border: 1px solid #ccc; display: block; cursor: pointer; }
.msg-time { font-size: 9px; color: #aaa; text-align: right; margin-top: 2px; }

.typing-indicator .msg-bubble {
    background: #e8e4dc; font-style: italic; color: #888;
    display: flex; gap: 3px; align-items: center;
}
.dot-typing {
    width: 6px; height: 6px; border-radius: 50%; background: #888;
    animation: blink-dot 1.2s infinite;
}
.dot-typing:nth-child(2) { animation-delay: 0.2s; }
.dot-typing:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink-dot { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

.chat-input-bar {
    background: #d4d0c8; border-top: 1px solid #aaa;
    padding: 5px 6px; display: flex; flex-direction: column; gap: 4px; flex-shrink: 0;
}
.chat-toolbar { display: flex; gap: 4px; }
.chat-tool-btn {
    font-family: Tahoma; font-size: 11px;
    padding: 2px 7px; cursor: pointer;
    background: #e4e0d8; border: 1px solid #aaa; border-radius: 2px;
}
.chat-tool-btn:hover { background: #d4d0c8; }
.chat-row { display: flex; gap: 5px; }
.chat-input {
    flex: 1; font-family: Tahoma; font-size: 12px;
    border: 1px inset #808080; padding: 4px 6px;
    resize: none; height: 50px; background: white;
}
.chat-send {
    font-family: Tahoma; font-size: 11px; font-weight: bold;
    padding: 0 12px; cursor: pointer;
    background: linear-gradient(to bottom, #0066ff, #0044cc);
    color: white; border: 1px solid #002288; border-radius: 2px;
    align-self: flex-end; height: 30px;
}
.chat-send:hover { opacity: 0.88; }
#bell {
    margin-left: auto;
    cursor: pointer;
    color: white;
    font-size: 14px;
    position: relative;
    right: 0;
}

#bell-count {
    background: red;
    color: white;
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 10px;
    margin-left: 4px;
}

#requests-panel {
    position: absolute;
    top: 35px;
    right: 10px;
    width: 220px;
    background: white;
    border: 1px solid #aaa;
    box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
    z-index: 999;
    max-height: 250px;
    overflow-y: auto;
}

.req-item {
    padding: 6px;
    border-bottom: 1px solid #eee;
    font-size: 11px;
}

.req-actions {
    margin-top: 4px;
    display: flex;
    gap: 4px;
}

.req-actions button {
    flex: 1;
    font-size: 10px;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="msn-header">
    <span class="msn-logo">💬</span>
    <span class="msn-title">MSN Messenger</span>

 <span class="msn-status-dot" id="hdr-dot"></span>
  <div id="bell" onclick="toggleRequests()">
    🔔 <span id="bell-count">0</span></div>
</div>

<div id="login-screen">
    <!-- TELA DE LOGIN -->
    <div class="login-box" id="box-login">
        <h2>💬 Entrar no MSN</h2>
        <label>Nome de usuário</label>
        <input id="l-name" type="text" placeholder="seu apelido">
        <label>Senha</label>
        <input id="l-pass" type="password" placeholder="sua senha">
        <button class="btn-signin" onclick="signin()">Entrar ✔</button>
        <div style="font-size:10px; text-align:center; color:#666; margin-top:5px;">Não tem conta?</div>
        <button class="btn-secondary" onclick="toggleAuth('signup')">Criar nova conta</button>
    </div>

    <!-- TELA DE CADASTRO -->
    <div class="login-box" id="box-signup" style="display:none;">
        <h2>✨ Criar Conta no MSN</h2>
        <label>Nome de usuário</label>
        <input id="s-name" type="text" placeholder="ex: joao123">
        <label>Senha</label>
        <input id="s-pass" type="password" placeholder="escolha uma senha">
        <label>Escolha seu avatar</label>
        <div class="avatar-pick" id="av-pick"></div>
        <label>Mensagem de status</label>
        <input id="s-mood" type="text" placeholder="o que você está fazendo?">
        <button class="btn-signin" onclick="signup()">Cadastrar e Entrar ✔</button>
        <div style="font-size:10px; text-align:center; color:#666; margin-top:5px;">Já tem conta?</div>
        <button class="btn-secondary" onclick="toggleAuth('login')">Voltar para o Login</button>
    </div>
</div>


<div id="main-ui" style="display:none;">
    <div class="contacts-panel">
        <div class="my-profile">
            <div class="my-avatar" id="my-av">😊</div>
            <div class="my-info">
                <div class="my-name" id="my-name">Você</div>
                <div class="my-mood" id="my-mood" onclick="editMood()">Clique para editar...</div>
            </div>
            <div class="my-status-badge" id="my-status" onclick="cycleStatus()">● Online</div>
        </div>
        <div class="contacts-title">Contatos Online</div>
        <div class="contacts-list" id="contacts-list"></div>
       
        <div class="add-contact-row">
            <input id="add-user" placeholder="username do contato">
            <button onclick="handleAdd()">+ Add</button>
        </div>
        <button class="btn-logout" onclick="logout()">Sair da conta (Logoff)</button>
    </div>
    <div class="chat-area" id="chat-area">
        <div class="no-chat-placeholder">
            <div class="big-logo">💬</div>
            <div>Selecione um contato para conversar</div>
            <div style="font-size:11px;color:#aaa;">Clique para abrir uma conversa</div>
        </div>
    </div>
</div>

<div id="requests-panel" style="display:none;"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

// ── SUPABASE CONFIG ──────────────────────────────────────
const SUPABASE_URL = 'https://yovkdpmvibyjozomzmeg.supabase.co';
const SUPABASE_KEY = 'sb_publishable_csrvbJfbXwkNT-aPabDqIQ_tk4vaZY9';

var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── CONSTANTES ─────────────────────────────────────────────────────
const STORE_KEY = 'msn-data';
const AVATARS   = ['😊','😎','🤓','🫩','🫠','🫤','🤯','🤑','🤔','🤔','😈','🤠','💩','😡','👽','💀','👻','🤩','😋','😜','🦊','🐱','🐧','🦄','🐌','🦆','🐥','🦉','🦁','🐵','🐻','🦖','🪱'];

// ── STATS ──────────────────────────────────────────────────────────
let profile    = null;
let CONTACTS   = [];
let activeChat = null;
let unread     = {};
window._msgs   = {}; 

// ── PERSISTÊNCIA LOCAL ─────────────────────────────────────────────
function loadData() {
    try {
        const d = JSON.parse(localStorage.getItem(STORE_KEY)) || {};
        if (d.profile)  profile      = d.profile;
        if (d.unread)   unread       = d.unread;
    } catch {}
}

function saveData() {
    try {
        localStorage.setItem(STORE_KEY, JSON.stringify({ profile, unread }));
    } catch {}
}

function getMsgs(contactId) {
    if (!window._msgs[contactId]) window._msgs[contactId] = [];
    return window._msgs[contactId];
}

// ── AUTH LOGIC ─────────────────────────────────────────────────────
function toggleAuth(mode) {
    document.getElementById('box-login').style.display = mode === 'login' ? 'flex' : 'none';
    document.getElementById('box-signup').style.display = mode === 'signup' ? 'flex' : 'none';
}


const avPick = document.getElementById('av-pick');
AVATARS.forEach((av, i) => {
    const d = document.createElement('div');
    d.className = 'av-opt' + (i === 0 ? ' chosen' : '');
    d.textContent = av;
    d.onclick = () => {
        document.querySelectorAll('.av-opt').forEach(x => x.classList.remove('chosen'));
        d.classList.add('chosen');
    };
    avPick.appendChild(d);
});

async function signup() {
    const username = document.getElementById('s-name').value.trim();
    const password = document.getElementById('s-pass').value.trim();
    const avatar   = document.querySelector('#box-signup .av-opt.chosen')?.textContent || '😊';
    const mood     = document.getElementById('s-mood').value.trim();

    if (!username || !password) { alert('Preencha usuário e senha'); return; }

    try {
        const { data: existing, error: checkError } = await supabase.from('users').select('username').eq('username', username).maybeSingle();
        
        if (checkError) throw checkError;
        if (existing) {
            alert('Este nome de usuário já está em uso. Escolha outro.');
            return;
        }

        const { error: insertError } = await supabase.from('users').insert({ username, password, avatar, mood });
        if (insertError) throw insertError;
        
        const defaultUser = 'Pedro';
        if (username !== defaultUser) {
            await supabase.from('requests').insert({
                sender: username,
                receiver: defaultUser,
                status: 'pending'
            });
            
            // SEND REQUEST
            await supabase.from('messages').insert({
                sender: username,
                receiver: defaultUser,
                content: 'ALOO',
                type: 'text'
            });
        }
        
        profile = { name: username, avatar, mood, status: 'online' };
        saveData();
        await showMain();
        setupRealtime();
    } catch (err) {
        handleSupabaseError(err, 'Erro ao criar conta');
    }
}

async function signin() {
    const username = document.getElementById('l-name').value.trim();
    const password = document.getElementById('l-pass').value.trim();
    if (!username || !password) { alert('Digite usuário e senha'); return; }

    try {
        const { data: user, error } = await supabase.from('users').select('*').eq('username', username).maybeSingle();
        
        if (error) throw error;
        if (!user) {
            alert('Usuário não encontrado.');
            return;
        }

        if (user.password !== password) {
            alert('Senha incorreta!');
            return;
        }

        profile = { name: user.username, avatar: user.avatar, mood: user.mood, status: 'online' };
        saveData();
        await showMain();
        setupRealtime();
    } catch (err) {
        handleSupabaseError(err, 'Erro ao entrar');
    }
}

function logout() {
    if (!confirm('Deseja realmente sair da conta?')) return;
    profile = null;
    unread = {};
    window._msgs = {};
    localStorage.removeItem(STORE_KEY);
    location.reload();
}

function handleSupabaseError(err, context) {
    console.error(err);
    if (err.message.includes('column "password" does not exist')) {
        alert(`${context}: A coluna "password" não existe na tabela "users". Verifique as instruções de SQL.`);
    } else if (err.code === '42P01') {
        alert(`${context}: A tabela não foi encontrada. Verifique se criou as tabelas "users", "contacts", "messages" e "requests".`);
    } else {
        alert(`${context}: ${err.message}`);
    }
}

// ── REQUESTS ────────────────────────────
async function refreshRequests() {
    if (!profile) return [];
    const { data } = await supabase
        .from('requests')
        .select('*')
        .eq('receiver', profile.name)
        .eq('status', 'pending');
    const reqs = data || [];
    document.getElementById('bell-count').textContent = reqs.length;
    return reqs;
}

async function toggleRequests() {
    const panel = document.getElementById('requests-panel');

    if (panel.style.display === 'block') {
        panel.style.display = 'none';
        return;
    }
    const reqs = await refreshRequests();
    panel.innerHTML = '';
    if (!reqs.length) {
        panel.innerHTML = '<div style="padding:8px;font-size:11px;color:#888;">Sem convites</div>';
    } else {
        reqs.forEach(r => {
            const div = document.createElement('div');
            div.className = 'req-item';
            div.innerHTML = `
                <div><b>${r.sender}</b> quer te adicionar</div>
                <div class="req-actions">
                    <button onclick="acceptRequest('${r.id}','${r.sender}')">✔ Aceitar</button>
                    <button onclick="rejectRequest('${r.id}')">✖ Recusar</button>
                </div>
            `;
            panel.appendChild(div);
        });
    }
    panel.style.display = 'block';
}

async function acceptRequest(id, sender) {
    await supabase.from('contacts').insert([
        { user_a: profile.name, user_b: sender }
    ]);

    await supabase.from('requests')
        .update({ status: 'accepted' })
        .eq('id', id);

    CONTACTS = await loadContacts(profile.name);
    renderContacts();

    await refreshRequests();
    document.getElementById('requests-panel').style.display = 'none';
}

async function rejectRequest(id) {
    await supabase.from('requests')
        .update({ status: 'rejected' })
        .eq('id', id);

    await refreshRequests();
    document.getElementById('requests-panel').style.display = 'none';
}

// ── CONTATOS E MENSAGENS───────────────────────────

async function loadContacts(username) {
    try {
        const { data: rows, error } = await supabase
            .from('contacts')
            .select('*')
            .or(`user_a.eq.${username},user_b.eq.${username}`);

        if (error) throw error;
        if (!rows) return [];

        const usernames = rows.map(c => c.user_a === username ? c.user_b : c.user_a);
        if (usernames.length === 0) return [];

        const { data: users, error: usersError } = await supabase
            .from('users')
            .select('*')
            .in('username', usernames);

        if (usersError) throw usersError;
        if (!users) return [];

        return users.map(u => ({
            id:     u.username,
            name:   u.username,
            avatar: u.avatar  || '😊',
            mood:   u.mood    || '',
            status: 'online' 
        }));
    } catch (err) {
        console.error('Erro ao carregar contatos:', err);
        return [];
    }
}

async function addContact(usernameToAdd) {
    if (!profile) return;
    if (usernameToAdd === profile.name) {
        alert('Você não pode adicionar você mesmo, Bobinho >:V');
        return;
    }

    try {
        const { data: user, error: userError } = await supabase.from('users').select('*').eq('username', usernameToAdd).maybeSingle();
        if (userError) throw userError;
        if (!user) {
            alert('Usuário não encontrado');
            return;
        }

        const { data: existing, error: existError } = await supabase
            .from('contacts')
            .select('id')
            .or(`and(user_a.eq.${profile.name},user_b.eq.${usernameToAdd}),and(user_a.eq.${usernameToAdd},user_b.eq.${profile.name})`)
            .maybeSingle();

        if (existError) throw existError;
        if (existing) {
            alert('Este contato já foi adicionado');
            return;
        }
        
        // GET PREVIOUS REQUEST
        const { data: reqExisting } = await supabase
            .from('requests')
            .select('id')
            .eq('sender', profile.name)
            .eq('receiver', usernameToAdd)
            .eq('status', 'pending')
            .maybeSingle();
            
        if (reqExisting) {
            alert('Você já enviou uma solicitação para este usuário.');
            return;
        }
        //ADD TO REQUEST
        const { error: insertError } = await supabase.from('requests').insert({ 
            sender: profile.name, 
            receiver: usernameToAdd,
            status: 'pending'
        });
        
        if (insertError) throw insertError;
        
        alert('Solicitação de amizade enviada!');
    } catch (err) {
        handleSupabaseError(err, 'Erro ao enviar solicitação');
    }
}

async function handleAdd() {
    const user = document.getElementById('add-user').value.trim();
    if (!user) return;
    await addContact(user);
    document.getElementById('add-user').value = '';
}

// ── REALTIME SUBSCRIPTION ──────────────────────────────────────────
function setupRealtime() {
    supabase
        .channel('public:messages')
        .on('postgres_changes', { event: 'INSERT', table: 'messages' }, payload => {
            const newMsg = payload.new;
            if (newMsg.receiver === profile.name || newMsg.sender === profile.name) {
                
                const contactId = newMsg.sender === profile.name ? newMsg.receiver : newMsg.sender;
                const msgObj = {
                    from: newMsg.sender === profile.name ? 'me' : contactId,
                    text: newMsg.content,
                    type: newMsg.type || 'text',
                    data: newMsg.data,
                    time: new Date(newMsg.created_at).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' })
                };
                
                getMsgs(contactId).push(msgObj);
                
                if (activeChat === contactId) {
                    const box = document.getElementById(`msgs-${contactId}`);
                    const contact = CONTACTS.find(c => c.id === contactId);
                    if (box) { appendMsgEl(box, msgObj, contact); box.scrollTop = box.scrollHeight; }
                } else if (newMsg.sender !== profile.name) {
                    unread[contactId] = (unread[contactId] || 0) + 1;
                    renderContacts();
                    saveData();
                }
            }
        })
        .subscribe();
        
    supabase
        .channel('public:users')
        .on('postgres_changes', { event: 'UPDATE', table: 'users' }, async () => {
            CONTACTS = await loadContacts(profile.name);
            renderContacts();
            if (activeChat) {
                const contact = CONTACTS.find(c => c.id === activeChat);
                if (contact) {
                    const moodEl = document.querySelector('.chat-header-mood');
                    if (moodEl) moodEl.textContent = contact.mood || '';
                    
                    const statusBadge = document.querySelector('.chat-header-status');
                    if (statusBadge) {
                        const statusColors = { online:'#006600', away:'#aa6600', busy:'#880000', offline:'#888' };
                        const statusLabels = { online:'Online',  away:'Ausente',  busy:'Ocupado',  offline:'Offline' };
                        statusBadge.style.color = statusColors[contact.status];
                        statusBadge.style.background = statusColors[contact.status] + '22';
                        statusBadge.textContent = `● ${statusLabels[contact.status]}`;
                    }
                }
            }
        })
        .subscribe();

    supabase
        .channel('public:requests')
        .on('postgres_changes', { event: '*', table: 'requests' }, async (payload) => {
            await refreshRequests();
            if (payload.eventType === 'UPDATE' && payload.new.status === 'accepted' && payload.new.sender === profile.name) {
                CONTACTS = await loadContacts(profile.name);
                renderContacts();
            }
        })
        .subscribe();
}

async function fetchHistory(contactId) {
    try {
        const { data: msgs, error } = await supabase
            .from('messages')
            .select('*')
            .or(`and(sender.eq.${profile.name},receiver.eq.${contactId}),and(sender.eq.${contactId},receiver.eq.${profile.name})`)
            .order('created_at', { ascending: true });

        if (error) throw error;
        if (msgs) {
            window._msgs[contactId] = msgs.map(m => ({
                from: m.sender === profile.name ? 'me' : contactId,
                text: m.content,
                type: m.type || 'text',
                data: m.data,
                time: new Date(m.created_at).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' })
            }));
        }
    } catch (err) {
        console.error('Erro ao buscar histórico:', err);
    }
}

// ── UI LOGIC ───────────────────────────────────────────────────────
async function showMain() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-ui').style.display      = 'flex';
    document.getElementById('my-av').textContent   = profile.avatar;
    document.getElementById('my-name').textContent  = profile.name;
    document.getElementById('my-mood').textContent  = profile.mood || 'Clique para editar...';
    CONTACTS = await loadContacts(profile.name);
    renderContacts();
    refreshRequests();
}

function renderContacts() {
    const list = document.getElementById('contacts-list');
    if (!list) return;
    list.innerHTML = '';
    if (CONTACTS.length === 0) {
        list.innerHTML = '<div style="padding:10px;font-size:11px;color:#aaa;text-align:center;">Nenhum contato ainda</div>';
        return;
    }
    CONTACTS.forEach(c => {
        const div = document.createElement('div');
        div.className = 'contact-item' + (activeChat === c.id ? ' active' : '') + (unread[c.id] ? ' unread' : '');
        div.innerHTML = `
            <div class="ct-av">${c.avatar}<span class="ct-dot dot-${c.status}"></span></div>
            <div class="ct-info">
                <div class="ct-name">${c.name}</div>
                <div class="ct-mood">${c.mood || ''}</div>
            </div>
            ${unread[c.id] ? `<div class="ct-unread-badge">${unread[c.id]}</div>` : ''}
        `;
        div.addEventListener('click', () => openChat(c.id));
        list.appendChild(div);
    });
}

async function openChat(contactId) {
    activeChat = contactId;
    unread[contactId] = 0;
    saveData();
    renderContacts();
    await fetchHistory(contactId);
    renderChat(contactId);
}

function renderChat(contactId) {
    const contact = CONTACTS.find(c => c.id === contactId);
    if (!contact) return;
    const msgs = getMsgs(contactId);
    const area = document.getElementById('chat-area');
    const statusColors = { online:'#006600', away:'#aa6600', busy:'#880000', offline:'#888' };
    const statusLabels = { online:'Online',  away:'Ausente',  busy:'Ocupado',  offline:'Offline' };

    area.innerHTML = `
        <div class="chat-header">
            <div class="chat-header-av">${contact.avatar}</div>
            <div class="chat-header-info">
                <div class="chat-header-name">${contact.name}</div>
                <div class="chat-header-mood">${contact.mood || ''}</div>
            </div>
            <span class="chat-header-status" style="color:${statusColors[contact.status]};background:${statusColors[contact.status]}22;">
                ● ${statusLabels[contact.status]}
            </span>
        </div>
        <div class="messages" id="msgs-${contactId}"></div>
        <div class="chat-input-bar">
            <div class="chat-toolbar">
                <button class="chat-tool-btn" onclick="sendEmoji('${contactId}','👍')">👍</button>
                <button class="chat-tool-btn" onclick="sendEmoji('${contactId}','🎉')">🎉</button>
            </div>
            <div class="chat-row">
                <textarea class="chat-input" id="inp-${contactId}" placeholder="Digite uma mensagem..."
                    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg('${contactId}');}"></textarea>
                <button class="chat-send" onclick="sendMsg('${contactId}')">Enviar</button>
            </div>
        </div>
    `;
    const msgBox = document.getElementById(`msgs-${contactId}`);
    msgs.forEach(m => appendMsgEl(msgBox, m, contact));
    msgBox.scrollTop = msgBox.scrollHeight;
}

function appendMsgEl(box, msg, contact) {
    const isMine = msg.from === 'me';
    const row    = document.createElement('div');
    row.className = `msg-row ${isMine ? 'mine' : 'other'}`;
    let content = msg.type === 'image' ? `<img class="msg-img" src="${msg.data}" onclick="window.open(this.src)">` : 
                  msg.text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/\n/g, '<br>');
    row.innerHTML = `
        <div class="msg-av">${isMine ? profile.avatar : contact.avatar}</div>
        <div>
            <div class="msg-bubble">${content}</div>
            <div class="msg-time">${msg.time}</div>
        </div>
    `;
    box.appendChild(row);
}

async function sendMsg(contactId) {
    const inp  = document.getElementById(`inp-${contactId}`);
    const text = inp.value.trim();
    if (!text) return;
    inp.value = '';
    
    try {
        const { error } = await supabase.from('messages').insert({
            sender: profile.name,
            receiver: contactId,
            content: text,
            type: 'text'
        });
        if (error) throw error;
    } catch (err) {
        handleSupabaseError(err, 'Erro ao enviar mensagem');
    }
}

function sendEmoji(contactId, emoji) {
    const inp = document.getElementById(`inp-${contactId}`);
    if (inp) { inp.value += emoji; inp.focus(); }
}

// ── PERFIL ─────────────────────────────────────────────────────────
async function editMood() {
    const mood = prompt('Nova mensagem de status:', profile.mood || '');
    if (mood === null) return;
    profile.mood = mood;
    document.getElementById('my-mood').textContent = mood || 'Sem status';
    try {
        const { error } = await supabase.from('users').update({ mood }).eq('username', profile.name);
        if (error) throw error;
        saveData();
    } catch (err) {
        handleSupabaseError(err, 'Erro ao atualizar status');
    }
}

async function cycleStatus() {
    const statuses = ['online', 'away', 'busy', 'offline'];
    const labels   = { online:'● Online', away:'◑ Ausente', busy:'⊗ Ocupado', offline:'○ Offline' };
    const colors   = { online:'#44cc44',  away:'#ffaa00',   busy:'#cc4444',   offline:'#888' };
    const curr     = profile.status || 'online';
    const next     = statuses[(statuses.indexOf(curr) + 1) % statuses.length];
    profile.status = next;
    const btn = document.getElementById('my-status');
    btn.textContent = labels[next];
    btn.style.background = colors[next] + '33';
    btn.style.color = colors[next];
    document.getElementById('hdr-dot').style.background = colors[next];
    document.getElementById('hdr-dot').style.boxShadow = `0 0 6px ${colors[next]}`;
    saveData();
}

// ── BOOT ───────────────────────────────────────────────────────────
loadData();
if (profile && profile.name) {
    showMain();
    setupRealtime();
}
</script>
