```
<div class="app">
    <h2>🎣 Clicknator.exe</h2>
    <p>Click</p>

    <p><b>Versão:</b> 1.0</p>

    <button onclick="baixar('clicknator')">Baixar</button>
</div>
</div>

<script>
function baixar(id) {
    window.parent.unlockApp(id);
    alert('Download concluído! 🎉');
    window.parent.postMessage({
        type: 'open-app',
        appId: id
    }, '*');
}
</script>
