<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>MP3 Explorer 2003</title>

<style>
body {
    font-family: Verdana, Arial, sans-serif;
    background-image: url("../hacker.gif");

    margin: 0;
    padding: 10px;
}

.site-wrapper {
    display:flexbox;
    width: 100%;
    max-width: 950px;
    margin: 0 auto;
    background-color: #31313e;
    border: 3px solid #00ffff;
}

.header {
    text-align: center;
    left:0;
    background-color: #000000;
    padding: 15px;
    border-bottom: 3px solid #00ffff;
}

h1 {
    font-family: "Comic Sans MS", cursive;
    color: #ffff00;
    font-size: 36px;
    margin: 0;
    text-shadow: 3px 3px #ff0000;
    letter-spacing: 2px;
}

marquee {
    background-color: #ff0000;
    color: #ffffff;
    font-family: "Courier New", Courier, monospace;
    font-size: 14px;
    font-weight: bold;
    padding: 6px;
    border-bottom: 3px solid #00ffff;
}

.content-area {
    display: table-row;
}

.sidebar {
    display: table-cell;
    width: 160px;
    background-color: #000066;
    vertical-align: top;
    padding: 15px;
    border-right: 1px solid #00ffff;
    border-left: 1px solid #00ffff;
}

.main-content {
    display: table-cell;
    vertical-align: top;

    padding: 10px;
}

.banner-img {
    width: 100%;
    border: 2px solid #ffffff;
    margin-bottom: 20px;
}

.nav-links {
    list-style-type: square;
    color: #00ff00;
    padding-left: 20px;
    font-size: 12px;
}

.nav-links li {
    margin-bottom: 10px;
}

.nav-links a {
    color: #00ffff;
    text-decoration: none;
    font-weight: bold;
}

.nav-links a:hover {
    color: #ffffff;
    text-decoration: underline;
}

.song {
    background-color: #000000;
    border: 1px solid #00ff00;
    padding: 12px;
    margin-bottom: 15px;
}

.song-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.song-name {
    color: #00ffff;
    font-weight: bold;
    font-size: 13px;
}

button {
    background-color: #0000ff;
    color: #ffffff;
    border: 2px solid #ffffff;
    padding: 6px 15px;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    font-family: Verdana, sans-serif;
}

button:active {
    background-color: #0000aa;
    border-style: inset;
}

button:disabled {
    background-color: #333333;
    color: #888888;
    border-color: #555555;
    cursor: not-allowed;
}

.progress {
    height: 14px;
    background-color: #222222;
    border: 1px solid #ffffff;
    margin-top: 12px;
    width: 100%;
}

.fill {
    height: 100%;
    width: 0%;
    background-color: #00ff00;
}

.footer {
    text-align: center;
    padding: 20px;
    background-color: #000000;
    border-top: 3px solid #00ffff;
    font-size: 11px;
    color: #cccccc;
}

.hit-counter {
    margin-top: 10px;
    border: 1px solid #ffffff;
}
</style>
</head>

<body>

<div class="site-wrapper">
    <div class="header">
        <h1>~* MP3 EXPLORER 2003 *~</h1>
    </div>

    <marquee scrollamount="5">!!! SO OS HITS DO MOMENTOOO ! Baixe rápido antes que o servidor caia !!!  100% Grátis !!!</marquee>

    <div class="content-area">
        <div class="sidebar">
            <img src="https://dummyimage.com/130x400/ff00ff/ffffff.gif&text=VOCE+GANHOU+NA+LOTERIA+CONFIRA!!" alt="Banner Lateral Esquerdo" class="banner-img">
            
            <ul class="nav-links">
                <li><a href="#">Ultimos Lançamentos </a></li>
                <li><a href="#">Top 100 Musicas</a></li>
                <li><a href="#">Fórum</a></li>
                <li><a href="#">Fofocas de famosos</a></li>
                <li><a href="#">Links Parceiros</a></li>
            </ul>
        </div>

        <div class="main-content" id="list">
            
        </div>

        <div class="sidebar">
            <img src="https://dummyimage.com/130x400/000000/00ff00.gif&text=MELHORES+RINGTONES+NOKIA" alt="Banner Lateral Direito" class="banner-img">
        </div>
    </div>
    <div class="footer">
        <br>
        <br>
        <img src="https://dummyimage.com/80x20/000/fff.gif&text=0+0+1+3+3+7" alt="Contador de Visitas" class="hit-counter">
    </div>
</div>

<script>
const songs = [
    {
        name: "LinkPark_In_The-End.mp3",
        url: 'sites/rockdobrabo.mp3',
        size: 5
    },
    {
        name: "LinkPark_In_The-End.mp3",
        url: 'rockdobrabo.mp3',
        size: 5
    }
];

const list = document.getElementById('list');

songs.forEach(song => {
    const el = document.createElement('div');
    el.className = 'song';

    el.innerHTML = `
        <div class="song-top">
            <span class="song-name">💾 ${song.name} (${song.size} MB)</span>
            <button>DOWNLOAD</button>
        </div>
        <div class="progress"><div class="fill"></div></div>
    `;

    const btn = el.querySelector('button');
    const fill = el.querySelector('.fill');

    btn.onclick = () => {
        btn.disabled = true;
        btn.innerText = "BAIXANDO...";

        let progress = 0;

        const interval = setInterval(() => {
            progress += Math.random() * 15;
            if(progress > 100) progress = 100;
            fill.style.width = progress + "%";

            if (progress >= 100) {
                clearInterval(interval);

                btn.innerText = "CONCLUÍDO";

                window.parent.postMessage({
                    type: "download-musga",
                    file: {
                        name: song.name,
                        type: "audio",
                        size: song.size,
                        data: { src: song.url }
                    }
                }, "*");
            }
        }, 300);
    };

    list.appendChild(el);
});
</script>

</body>
</html>
