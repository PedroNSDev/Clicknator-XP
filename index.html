        <!DOCTYPE html>
        <html lang="pt-BR">
        <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ClickNator XP</title>

        <link rel="stylesheet" href="style.css">

        <style>

        /* ═════════ BOOT VISTAA STYLE ═════════ */


            #boot-screen {
                position: fixed;
                inset: 0;
                background: linear-gradient(180deg, #7ecbff, #3a8dde);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 99999;
                font-family: Tahoma, sans-serif;
                color: #fff;
            }

            .boot-content {
                text-align: center;
            }

            #boot-logo {
                width: 220px;
                margin-bottom: 10px;
            }
            .boot-title {
                font-size: 22px;
                font-weight: bold;
                margin-top: 10px;
            }

            .boot-sub {
                font-size: 14px;
                color: #ccc;
                margin-bottom: 30px;
            }

            .boot-bar {
                width: 220px;
                height: 18px;
                border: 2px solid #444;
                background: #111;
                overflow: hidden;
                position: relative;
                margin: 0 auto;
            }
            .boot-progress {
                position: absolute;
                width: 60px;
                height: 100%;
                background: linear-gradient(
                    to right,
                    #001a66,
                    #0055ff,
                    #66ccff,
                    #0055ff,
                    #001a66
                );animation: xpLoad 1.2s linear infinite;
            }

            @keyframes xpLoad {
                0% { left: -60px; }
                100% { left: 220px; }
            }

            .boot-footer {
                margin-top: 25px;
                font-size: 12px;
                color: #888;
            }

        </style>
        </head>
        <body>

        <!-- BOOT -->
                <div id="boot-screen">
                <div class="boot-content">

                    <img src="logo.png" id="boot-logo">

                    <div class="boot-title">PWR-Operacional System</div>
                    <div class="boot-sub">Personal</div>

                    <div class="boot-bar">
                        <div class="boot-progress"></div>
                    </div>

                    <div class="boot-footer">©PWM-MR Corporation</div>

                </div>
            </div>

        <audio id="boot-audio" src="boot.mp3" preload="auto"></audio>

        <!-- SISTEMA -->
        <canvas id="cables"></canvas>
        <div id="desktop"></div>

        <div id="taskbar">
            <button id="start-btn">
                <span style="font-style:italic;font-weight:bold;">Iniciar</span>
            </button>

            <div id="start-menu">
                <div id="start-apps-list"></div>
                <div class="menu-separator"></div>
                <button id="change-wallpaper">Trocar papel de parede</button>
                <input type="file" id="wallpaper-input" style="display:none">
                <button id="shutdown-btn">Desligar</button>
            </div>

            <div id="quick-launch"></div>
            <div id="taskbar-apps"></div>
            <div id="clock">12:00</div>
        </div>

        <div id="context-menu">
            <div class="menu-item" id="menu-open">Abrir</div>
            <div class="menu-item" id="menu-rename">Renomear</div>
            <div class="menu-item" id="menu-delete" style="color:#a00;">🗑 Excluir</div>

            <div class="menu-separator"></div>

            <div class="menu-item" id="menu-pin">Adicionar à Barra de Tarefas</div>

            <div class="menu-separator"></div>
            <div class="menu-item" id="menu-unlock">Desbloquear Pescaria</div>

            <div class="menu-separator"></div>
            <div class="menu-item" id="menu-new-notepad">Novo &gt; Bloco de notas</div>
            <div class="menu-item" id="menu-new-folder">Novo &gt; Pasta</div>
        </div>
    <script src="script.js"></script>
      <script>
const texts = [
    "Iniciando serviços...",
    "Carregando sistema...",
    "Inicializando interface...",
    "Aplicando configurações...",
    "Finalizando boot...",
    "Bem vindo!"
];
const audio = document.getElementById("boot-audio");


window.addEventListener("load", () => {
    const boot = document.getElementById("boot-screen");
    const audio = document.getElementById("boot-audio");

    setTimeout(() => {
        boot.style.transition = "opacity 1s";
        boot.style.opacity = "0";

        setTimeout(() => {
            boot.remove();
        }, 1000);

        audio.currentTime = 0;
        audio.play().catch(()=>{});
    }, 2700); 
});
</script>


        </body>
        </html>
